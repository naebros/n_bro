<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Naebro</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/global.css" />
  <style>
    .page-404 {
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px var(--space-8);
      gap: var(--space-6);
      background: var(--color-surface);
      min-height: calc(100vh - 67px);
      transition: background var(--transition-normal);
    }

    .page-404__code {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 160px;
      line-height: 1;
      letter-spacing: -0.05em;
      color: var(--color-border);
      user-select: none;
      transition: color var(--transition-normal);
    }

    .page-404__content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
      max-width: 480px;
    }

    .page-404__actions {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      justify-content: center;
    }

    @media (max-width: 480px) {
      .page-404__code { font-size: 96px; }
      .page-404 { padding: 60px var(--space-4); }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="header">
    <div class="header__logo">
      <a href="index.html" aria-label="Go to homepage">
        <svg viewBox="0 0 24 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M6 18C6 15.79 7.79 14 10 14H14V22H10C7.79 22 6 20.21 6 18Z"/>
          <path d="M14 14H18C20.21 14 22 15.79 22 18C22 20.21 20.21 22 18 22H14V14Z"/>
          <path d="M6 10C6 7.79 7.79 6 10 6H14V14H10C7.79 14 6 12.21 6 10Z"/>
          <path d="M14 6H18C20.21 6 22 7.79 22 10C22 12.21 20.21 14 18 14H14V6Z"/>
          <path d="M6 26C6 23.79 7.79 22 10 22H14V26C14 28.21 12.21 30 10 30C7.79 30 6 28.21 6 26Z"/>
        </svg>
      </a>
    </div>

    <div class="header__auth">
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <i data-lucide="moon"></i>
      </button>
      <a href="index.html" class="btn btn--outline"><i data-lucide="house"></i>Home</a>
      <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="btn btn--dark">
        <i data-lucide="github"></i>Github
      </a>
    </div>
  </header>


  <!-- ── 404 ── -->
  <main class="page-404">
    <div class="page-404__code" data-reveal="scale" aria-hidden="true">404</div>

    <div class="page-404__content" data-reveal="fade-up" style="transition-delay: 100ms">
      <h1 class="text-display-sm">Page not found</h1>
      <p class="text-body">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    </div>

    <div class="page-404__actions" data-reveal="fade-up" style="transition-delay: 180ms">
      <a href="index.html" class="btn btn--outline btn--md"><i data-lucide="arrow-left"></i>Go back</a>
      <a href="index.html#projects" class="btn btn--dark btn--md"><i data-lucide="layout-grid"></i>View projects</a>
    </div>
  </main>


  <script type="module">
    import { createIcons, icons } from 'https://esm.sh/lucide@latest';

    const renderIcons = (root = document) =>
      createIcons({ icons, nameAttr: 'data-lucide', rootNode: root });

    // ── Dark mode ───────────────────────────────────────────────────────────
    const html        = document.documentElement;
    const themeToggle = document.getElementById('theme-toggle');
    const THEME_KEY   = 'naebro-theme';

    const savedTheme = localStorage.getItem(THEME_KEY) ?? 'light';
    setTheme(savedTheme);

    function setTheme(theme) {
      html.setAttribute('data-theme', theme);
      localStorage.setItem(THEME_KEY, theme);
      themeToggle.innerHTML = theme === 'dark'
        ? '<i data-lucide="sun"></i>'
        : '<i data-lucide="moon"></i>';
      renderIcons(themeToggle);
    }

    themeToggle.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      setTheme(next);
    });

    // ── Scroll reveal ───────────────────────────────────────────────────────
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { rootMargin: '-5% 0px -5% 0px', threshold: 0.1 });

    document.querySelectorAll('[data-reveal]').forEach(el => revealObserver.observe(el));

    // ── Initial icon render ─────────────────────────────────────────────────
    renderIcons();
  </script>

</body>
</html>
